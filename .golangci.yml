version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - unused
  exclusions:
    rules:
      # Exclude errcheck in all test/benchmark files
      - path: _test\.go
        linters:
          - errcheck
      # Exclude standard safe-to-ignore closures and write/remove operations in prod files
      - linters:
          - errcheck
        text: "Error return value of `.*Close` is not checked"
      - linters:
          - errcheck
        text: "Error return value of `.*Write` is not checked"
      - linters:
          - errcheck
        text: "Error return value of `.*Remove` is not checked"
      - linters:
          - errcheck
        text: "Error return value of `.*MkdirAll` is not checked"
      - linters:
          - errcheck
        text: "Error return value of `.*ReadAll` is not checked"
