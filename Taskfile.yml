version: "3"

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  BUILD_TIME:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
  LDFLAGS: '-s -w -X github.com/gnur/exokephalos/internal/version.Version={{.VERSION}} -X github.com/gnur/exokephalos/internal/version.BuildTime={{.BUILD_TIME}}'

tasks:
  build:
    desc: Build the login CSS, SPA assets, and Go binary
    deps: [css, web]
    cmds:
      - go build -ldflags="{{.LDFLAGS}}" -o exo .

  web:
    desc: Build the React SPA/PWA
    cmds:
      - npm run build:web

  container:push:
    desc: Build and push linux/amd64 and linux/arm64 container image
    cmds:
      - |
        image="${IMAGE:-ghcr.io/gnur/exokephalos}"
        version="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
        build_time="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
        docker buildx build \
          --platform linux/amd64,linux/arm64 \
          --build-arg VERSION="$version" \
          --build-arg BUILD_TIME="$build_time" \
          --tag "$image:latest" \
          --tag "$image:$version" \
          --push \
          .

  css:
    desc: Build Tailwind CSS
    cmds:
      - npm run build:css

  vendor-js:
    desc: Download/update vendored JS dependencies
    cmds:
      - mkdir -p static/js
      - curl -sL "https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" -o static/js/htmx.min.js
      - curl -sL "https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js" -o static/js/chart.min.js
    sources:
      - Taskfile.yml
    generates:
      - static/js/htmx.min.js
      - static/js/chart.min.js

  css:watch:
    desc: Watch and rebuild Tailwind CSS on changes
    cmds:
      - npm run watch:css

  dev:
    desc: Run auto-reloading dev environment
    deps: [css]
    cmds:
      - task --parallel dev:server dev:css dev:web

  dev:server:
    desc: Run Go server with auto-reload on file changes
    cmds:
      - go run github.com/air-verse/air@latest

  dev:css:
    desc: Watch Tailwind CSS
    cmds:
      - npm run watch:css

  dev:web:
    desc: Run Vite dev server for the SPA
    cmds:
      - npm run dev:web

  dev:tui:
    desc: Create a temp dir, import all example-repo types, set up Helix LSP, and launch TUI
    deps: [build]
    cmds:
      - |
        mkdir -p ./tmp-run
        temp_dir=$(mktemp -d ./tmp-run/exo-XXXXXX)
        echo "Created temporary EXO_DIR at $temp_dir"
        mkdir -p "$temp_dir/.exo"
        cp -r ./example-repo/.exo/* "$temp_dir/.exo/"
        EXO_DIR="$temp_dir" ./exo import ./example-repo/book book
        EXO_DIR="$temp_dir" ./exo import ./example-repo/note note
        EXO_DIR="$temp_dir" ./exo import ./example-repo/webhook webhook
        EXO_DIR="$temp_dir" ./exo import ./example-repo/secret secret
        EXO_DIR="$temp_dir" ./exo import ./example-repo/docs doc
        EXO_DIR="$temp_dir" ./exo helix-init
        EXO_DIR="$temp_dir" ./exo

  dev:serve:
    desc: Create a temp dir, import all example-repo types, and start web UI server
    deps: [build]
    cmds:
      - |
        mkdir -p ./tmp-run
        temp_dir=$(mktemp -d ./tmp-run/exo-XXXXXX)
        echo "Created temporary EXO_DIR at $temp_dir"
        mkdir -p "$temp_dir/.exo"
        cp -r ./example-repo/.exo/* "$temp_dir/.exo/"
        EXO_DIR="$temp_dir" ./exo import ./example-repo/book book
        EXO_DIR="$temp_dir" ./exo import ./example-repo/note note
        EXO_DIR="$temp_dir" ./exo import ./example-repo/webhook webhook
        EXO_DIR="$temp_dir" ./exo import ./example-repo/secret secret
        EXO_DIR="$temp_dir" ./exo import ./example-repo/docs doc
        EXO_DIR="$temp_dir" ./exo serve

  dev:integration-test:
    desc: Create local sync-enabled serve/client dirs, seed client notes, and start exo serve
    deps: [build]
    cmds:
      - |
        mkdir -p ./tmp-run
        server_dir=$(mktemp -d ./tmp-run/exo-sync-server-XXXXXX)
        client_dir=$(mktemp -d ./tmp-run/exo-sync-client-XXXXXX)
        port="${PORT:-8293}"

        mkdir -p "$server_dir/.exo" "$client_dir/.exo"

        cat > "$server_dir/.exo/serve.toml" <<EOF
        [sync.server]
        enabled = true
        db_path = ".exo/server.sqlite"
        listen = ":$port"
        EOF

        cat > "$client_dir/.exo/tui.toml" <<EOF
        [sync]
        server_url = "http://localhost:$port"
        client_id = "local-dev-client"
        EOF

        cp ./example-repo/.exo/*.toml "$client_dir"/
        EXO_DIR="$client_dir" ./exo import ./example-repo/note note
        EXO_DIR="$client_dir" ./exo import ./example-repo/docs doc

        cat <<EOF

        Local sync integration environment created.

        Server EXO_DIR:
          $server_dir

        TUI client EXO_DIR:
          $client_dir

        Starting sync-enabled exo serve on:
          http://localhost:$port

        In another terminal, start the TUI client:
          EXO_DIR="$client_dir" ./exo

        Then in the TUI:
          1. Press ':' to open the action picker.
          2. Run 'start-sync'.
          3. Open http://localhost:$port/admin/sync/clients
          4. Approve 'local-dev-client'.
          5. Wait for the TUI to continue automatically after approval.
          6. Run 'sync-outbox' to inspect queued/synced operations.

        Press Ctrl+C in this terminal to stop exo serve.

        EOF

        EXO_DIR="$server_dir" ./exo serve

  run:
    desc: Alias for dev:tui
    cmds:
      - task dev:tui

  test:
    desc: Run integration tests
    cmds:
      - go test -v -count=1 ./...

  test:e2e:
    desc: Run real binary, TUI PTY, sync server, and SPA browser E2E tests
    deps: [build]
    cmds:
      - npx playwright install chromium
      - go test -tags=e2e -v -count=1 ./e2e

  test:e2e:ui:
    desc: Run SPA E2E projects in headed/debug mode against an existing harness URL
    cmds:
      - npx playwright test --headed --debug

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  bench:
    desc: Run performance benchmarks (2000 notes, concurrent queries + deletes)
    cmds:
      - go test -bench=Benchmark -benchtime=1000x -cpu=4 -v -run='^$' -count=1 -timeout=300s

  bench:full:
    desc: Run full benchmarks across CPU configurations
    cmds:
      - go test -bench=Benchmark -benchtime=1000x -cpu=1,2,4,8 -v -run='^$' -count=1 -timeout=600s

  deploy:
    desc: Deploy to both fedora and imp, and install locally
    cmds:
      - task: deploy-local
      - task: deploy-fedora
      - task: deploy-imp

  deploy-local:
    desc: Build native binary and install to ~/.local/bin/
    deps: [css, vendor-js]
    cmds:
      - go build -ldflags="{{.LDFLAGS}}" -o exo .
      - mkdir -p ~/.local/bin
      - mv exo ~/.local/bin/exo

  deploy-fedora:
    desc: Build linux/amd64 binary and deploy to fedora
    deps: [css, vendor-js]
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="{{.LDFLAGS}}" -o exo .
      - ssh fedora "mkdir -p ~/.local/bin ~/.config/systemd/user"
      - ssh fedora "systemctl --user stop exo || true"
      - scp exo fedora:/home/erwin/.local/bin/exo
      - ssh fedora "chmod +x ~/.local/bin/exo"
      - scp deploy/exo.service fedora:/home/erwin/.config/systemd/user/exo.service
      - ssh fedora "systemctl --user daemon-reload && systemctl --user enable exo && systemctl --user start exo"
      - ssh fedora "tailscale serve --service=svc:exo http://localhost:8293"
      - rm exo

  deploy-imp:
    desc: Build linux/amd64 binary and deploy to imp
    deps: [css, vendor-js]
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="{{.LDFLAGS}}" -o exo .
      - ssh imp "mkdir -p ~/.local/bin ~/.config/systemd/user"
      - ssh imp "systemctl --user stop exo || true"
      - scp exo imp:/home/erwin/.local/bin/exo
      - ssh imp "chmod +x ~/.local/bin/exo"
      - scp deploy/exo.service imp:/home/erwin/.config/systemd/user/exo.service
      - ssh imp "systemctl --user daemon-reload && systemctl --user enable exo && systemctl --user start exo"
      - ssh imp "sudo tailscale serve --service=svc:exo http://localhost:8293"
      - rm exo
