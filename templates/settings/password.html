{{define "content"}}
<div class="max-w-lg">
    <h1 class="text-2xl font-bold mb-4">Password</h1>
    {{if .Error}}
    <div class="mb-4 text-sm text-red-300 bg-red-950 border border-red-800 rounded px-3 py-2">{{.Error}}</div>
    {{end}}
    {{if .Success}}
    <div class="mb-4 text-sm text-green-300 bg-green-950 border border-green-800 rounded px-3 py-2">{{.Success}}</div>
    {{end}}
    <form method="post" action="/settings/password" class="space-y-4">
        <div>
            <label class="block text-sm text-gray-400 mb-1">Current password</label>
            <input type="password"
                   name="current_password"
                   autocomplete="current-password"
                   class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-gray-100 focus:outline-none focus:border-blue-500">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">New password</label>
            <input type="password"
                   name="new_password"
                   autocomplete="new-password"
                   class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-gray-100 focus:outline-none focus:border-blue-500">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">Confirm new password</label>
            <input type="password"
                   name="confirm_password"
                   autocomplete="new-password"
                   class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-gray-100 focus:outline-none focus:border-blue-500">
        </div>
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded text-sm font-medium">Change password</button>
    </form>
</div>
{{end}}
